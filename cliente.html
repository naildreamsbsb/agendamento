<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nail Dreams</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
  <meta name="theme-color" content="#b98372">
  <meta name="description" content="Acompanhe seu atendimento Nail Dreams.">

  <meta property="og:title" content="Nail Dreams">
  <meta property="og:description" content="Acompanhe seu atendimento Nail Dreams.">
  <meta property="og:image" content="https://agendanaildreams.netlify.app/assets/og-naildreams-v2.jpg">
  <meta property="og:image:secure_url" content="https://agendanaildreams.netlify.app/assets/og-naildreams-v2.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://agendanaildreams.netlify.app/cliente.html">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nail Dreams">
  <meta name="twitter:description" content="Acompanhe seu atendimento Nail Dreams.">
  <meta name="twitter:image" content="https://agendanaildreams.netlify.app/assets/og-naildreams-v2.jpg">
  <link rel="stylesheet" href="css/style.css?v=20260716-3">
</head>
<body>

  <main class="cliente-page">
    <section class="cliente-card">

      <img src="assets/logo.png" alt="Nail Dreams" class="cliente-logo">

      <p class="eyebrow">Nail Dreams</p>

      <div class="contador-box" id="resumoAtendimento">
        <strong id="contadorFila">--</strong>
        <span>pessoas à sua frente</span>
      </div>

      <h1 id="statusTitulo">Carregando...</h1>
      <p id="statusComplemento" class="status-complemento" hidden></p>

      <div class="cliente-info">
        <div>
          <span>Cliente</span>
          <strong id="cliente"></strong>
        </div>

        <div>
          <span>Serviço</span>
          <strong id="servico"></strong>
        </div>

        <div>
          <span>Manicure</span>
          <strong id="manicure"></strong>
        </div>

        <div id="dataAtendimentoBox" hidden>
          <span>Data do atendimento</span>
          <strong id="dataAtendimento"></strong>
        </div>

        <div id="horarioAtendimentoBox">
          <span>Tempo restante</span>
          <strong id="horario"></strong>
        </div>
      </div>

      <div class="cliente-actions">
        <button type="button" class="btn-reagendar" onclick="abrirModalReagendar()">
          Reagendar
        </button>

        <button type="button" class="btn-cancelar" onclick="abrirModalCancelar()">
          Cancelar
        </button>
      </div>

    </section>
  </main>

  <div class="modal" id="modalCancelar">
    <div class="modal-card">
      <h2>Cancelar atendimento?</h2>
      <p id="textoCancelar">Essa ação cancelará seu atendimento. Deseja continuar?</p>

      <div class="modal-actions">
        <button onclick="fecharModais()">Voltar</button>
        <button class="btn-cancelar" onclick="confirmarCancelamento()">Sim, cancelar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="modalReagendar">
    <div class="modal-card">
      <h2>Escolha um novo horário</h2>
      <p>Selecione uma opção disponível para solicitar o reagendamento.</p>

      <div class="horarios-grid" id="horariosGrid"></div>

      <div class="modal-actions">
        <button onclick="fecharModais()">Voltar</button>
      </div>
    </div>
  </div>

  <script src="config/config.js?v=20260708-2"></script>
  <script src="js/cliente.js?v=20260716-3"></script>
</body>
</html>
